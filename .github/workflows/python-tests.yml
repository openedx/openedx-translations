# run make test for python

name: Python Tests

on:
  - pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-translations:
    runs-on: ubuntu-latest

    steps:
      # Define which file extensions, when touched, should trigger the
      # Python tests, so we can skip this Action if we've only touched .po files
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            non_pofiles:
              - '**.txt'
              - '**.yml'
              - '**.in'
              - '**.py'

      # Clones the openedx-translations repo
      - name: clone openedx/openedx-translations
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup node for testing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install nodejs requirements
        run: |
          npm clean-install

      - name: Install gettext
        if: steps.filter.outputs.non_pofiles == 'true'
        run: |
          sudo apt install -y gettext

      # Sets up Python
      - name: setup python
        if: steps.filter.outputs.non_pofiles == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # Run the script
      - name: run python tests
        if: steps.filter.outputs.non_pofiles == 'true'
        run: |
          make test_requirements
          make test
