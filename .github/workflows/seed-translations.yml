# This workflow seeds translations for JavaScript applications by calling the AI translations
# seed endpoint for each application and language code combination, using existing source string files and translated strings file.

name: Seed translations

on:
  workflow_dispatch:
    inputs:
      application_name:
        description: 'Application to seed translations for, corresponding to a repository name under the translations directory. Leave blank to run all.'
        required: false
        type: string
      translation_language:
        description: 'Language code to seed translations for in edX translations format (i.e. IETF BCP 47 format), typically {language-code}{-region-code (optional)} (e.g. es-419 or pt-PT). This is case insensitive. Leave blank to run all.'
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      javascript_applications: ${{ steps.generate_repo_matrix.outputs.javascript_applications }}
      translation_languages: ${{ steps.generate_repo_matrix.outputs.translation_languages }}
    steps:
      - uses: actions/github-script@v7
        id: generate_repo_matrix
        with:
          script: |
            // This is a mapping from JavaScript applications to additional options.
            const allJavascriptApps = {
              'frontend-app-account': {},
              'frontend-app-admin-portal': {},
              'frontend-app-authn': {},
              'frontend-app-communications': {},
              'frontend-app-discussions': {},
              'frontend-app-enterprise-api-doc': {},
              'frontend-app-enterprise-checkout': {},
              'frontend-app-enterprise-public-catalog': {},
              'frontend-app-gradebook': {},
              'frontend-app-learner-dashboard': {},
              'frontend-app-learner-portal-enterprise': {},
              'frontend-app-learner-portal-programs': {},
              'frontend-app-learner-record': {},
              'frontend-app-learning': {},
              'frontend-app-ora': {},
              'frontend-app-ora-grading': {},
              'frontend-app-payment': {},
              'frontend-app-profile': {},
              'frontend-app-program-console': {},
              'frontend-app-publisher': {},
              'frontend-app-skills': {},
              'frontend-app-support-tools': {},
              'frontend-component-authn-edx': {},
              'frontend-component-footer-edx': {},
              'frontend-component-header-edx': {},
              'frontend-components-tinymce-advanced-plugins-edx': {},
              'frontend-enterprise': { pathOverride: 'i18n' },
              'frontend-plugin-advertisements': {},
              'frontend-plugin-authn': {},
              'frontend-plugin-learner-dashboard': {},
              'frontend-plugin-notifications': {},
              'frontend-plugin-persona': {},
              'frontend-plugin-recommendations': {},
              'frontend-platform': {},
              'paragon': {},
              'studio-frontend': {},
              'frontend-plugin-framework': {},
            };

            // The seed translations endpoint supports language codes in the IETF BCP 47 format.
            // These language codes are a combination of a two-letter language code (i.e. the ISO 639-1 standard)
            // and the region subtag (ISO 3166-1 alpha-2 or UN M.49), separated by a hyphen.
            // As an example, "it-it", "es-419", "pt-pt", etc. We'll call this the edX language code.
            // However, the filenames in this repository for JSON messages files use languages in the IETF BCP 47 format
            // but with underscores instead of hyphens. This is not uncommon. We'll call this the repo language code.
            // The languages are defined as objects containing both language codes because the edX language code is required
            // to call the seed translations API while the repo code is required to find the required translation messages files.
            const languages = [
              { edxLang: "ar", repoLang: "ar" },
              { edxLang: "ca", repoLang: "ca" },
              { edxLang: "da", repoLang: "da" },
              { edxLang: "de-de", repoLang: "de_DE" },
              { edxLang: "el", repoLang: "el" },
              { edxLang: "es-419", repoLang: "es_419" },
              { edxLang: "es-es", repoLang: "es_ES" },
              { edxLang: "fa", repoLang: "fa" },
              { edxLang: "fr", repoLang: "fr" },
              { edxLang: "fr-ca", repoLang: "fr_CA" },
              { edxLang: "he", repoLang: "he" },
              { edxLang: "hi", repoLang: "hi" },
              { edxLang: "id", repoLang: "id" },
              { edxLang: "it-it", repoLang: "it_IT" },
              { edxLang: "ko-kr", repoLang: "ko" },
              { edxLang: "pl", repoLang: "pl" },
              { edxLang: "pt-br", repoLang: "pt_BR" },
              { edxLang: "pt-pt", repoLang: "pt_PT" },
              { edxLang: "ru", repoLang: "ru" },
              { edxLang: "sw", repoLang: "sw" },
              { edxLang: "te", repoLang: "te" },
              { edxLang: "th", repoLang: "th" },
              { edxLang: "tr-tr", repoLang: "tr_TR" },
              { edxLang: "uk", repoLang: "uk" },
              { edxLang: "zh-cn", repoLang: "zh_CN" }
            ];

            // In order to efficiently query for details about a selected language, we maintain a mapping from edX language codes
            // to the object that describes the language.
            const languageMap = languages.reduce((acc, lang) => {
              acc[lang.edxLang] = lang;
              return acc;
            }, {});

            // Need to use a workaround until https://github.com/actions/toolkit/issues/1576 is fixed
            // const appInput = core.getInput('application_name');
            // const languageInput = core.getInput('translation_language');

            const appInput = ${{ toJSON(github.event.inputs.application_name) }} || '';
            const languageInput = ${{ toJSON(github.event.inputs.translation_language) }} || '';
            const selectedApp = appInput ? appInput.toLowerCase() : '';
            const selectedLanguage = languageInput ? languageInput.toLowerCase() : '';

            if (selectedApp !== '' && !Object.keys(allJavascriptApps).includes(selectedApp)) {
              core.setFailed(`Selected application "${selectedApp}" is not a valid option.`);
              throw new Error(`Selected application "${selectedApp}" is not a valid option.`);
            }
            if (selectedLanguage !== '' && !Object.keys(languageMap).includes(selectedLanguage)) {
              core.setFailed(`Selected language "${selectedLanguage}" is not a valid option.`);
              throw new Error(`Selected language "${selectedLanguage}" is not a valid option.`);
            }

            const javascriptApplications = selectedApp === ''
              ? Object.entries(allJavascriptApps).map(([appName, config]) => ({ appName, ...config }))
              : [{ appName: selectedApp, ...allJavascriptApps[selectedApp] }];
            const translationLanguages = selectedLanguage === '' ? Object.values(languageMap) : [languageMap[selectedLanguage]];

            core.setOutput('javascript_applications', javascriptApplications);
            core.setOutput('translation_languages', translationLanguages);

  seed-translations:
    runs-on: ubuntu-latest
    needs: [setup]
    strategy:
      matrix:
        application: ${{ fromJson(needs.setup.outputs.javascript_applications) }}
      fail-fast: false
      max-parallel: 3
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Validate required environment variables
        run: |
          missing=0

          if [ -z "${{ vars.LMS_ACCESS_TOKEN_URL }}" ]; then
            echo "Required variable LMS_ACCESS_TOKEN_URL is not set."
            missing=$((missing+1))
          fi
          if [ -z "${{ vars.AI_TRANSLATIONS_SEED_TRANSLATIONS_URL }}" ]; then
            echo "Required variable AI_TRANSLATIONS_SEED_TRANSLATIONS_URL is not set."
            missing=$((missing+1))
          fi

          # Mask the client ID and secret to prevent it from being logged
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_STAGE_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.EDX_TRANSLATIONS_STAGE_CLIENT_SECRET }}"

          # Validate that the client ID is defined
          if [ -z "${{ secrets.EDX_TRANSLATIONS_STAGE_CLIENT_ID }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_STAGE_CLIENT_ID is not set."
            missing=$((missing+1))
          fi

          # Validate that the client secret is defined
          if [ -z "${{ secrets.EDX_TRANSLATIONS_STAGE_CLIENT_SECRET }}" ]; then
            echo "Required secret EDX_TRANSLATIONS_STAGE_CLIENT_SECRET is not set."
            missing=$((missing+1))
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required variables or secrets are missing. Please configure them in the repository settings under Variables or Secrets."
            exit 1
          fi

      - name: Fetch LMS JWT token
        run: |
          response_file="/tmp/lms_token_response.json"

          curl_exit_code=0
          status_code=$(curl -sS --connect-timeout 10 --max-time 120 \
            -w "%{http_code}" \
            -o "$response_file" \
            -X POST "${{ vars.LMS_ACCESS_TOKEN_URL }}" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.EDX_TRANSLATIONS_STAGE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.EDX_TRANSLATIONS_STAGE_CLIENT_SECRET }}" \
            -d "token_type=jwt") || curl_exit_code=$?

          if [ "$curl_exit_code" -ne 0 ]; then
            echo "Curl request to fetch LMS JWT failed with exit code $curl_exit_code."
            exit 1
          fi

          if [ "$status_code" -ne 200 ]; then
            echo "API call to fetch LMS JWT failed for application ${{ matrix.application.appName }} with status code $status_code."
            exit 1
          fi

          jwt_token=$(jq -r '.access_token' "$response_file")

          if [ -z "$jwt_token" ] || [ "$jwt_token" = "null" ]; then
            echo "Failed to extract access_token from LMS JWT response."
            exit 1
          fi

          # Mask the JWT so as not to inadvertently expose it.
          echo "::add-mask::$jwt_token"
          echo "JWT_TOKEN=$jwt_token" >> $GITHUB_ENV

      - name: Seed translation languages for ${{ matrix.application.appName }}
        run: |
          # Mask the JWT so as not to inadvertently expose it.
          echo "::add-mask::$JWT_TOKEN"

          translation_languages='${{ needs.setup.outputs.translation_languages }}'
          i18n_path="${{ matrix.application.pathOverride || 'src/i18n' }}"

          num_failures=0
          num_attempted=0

          for lang in $(echo "$translation_languages" | jq -c '.[]'); do
            edxLang=$(echo "$lang" | jq -r '.edxLang')
            repoLang=$(echo "$lang" | jq -r '.repoLang')

            echo "Processing language $edxLang for application ${{ matrix.application.appName }}."

            translations_file_path="translations/${{ matrix.application.appName }}/${i18n_path}/messages/${repoLang}.json"
            source_strings_file_path="translations/${{ matrix.application.appName }}/${i18n_path}/transifex_input.json"

            if [ ! -f "$translations_file_path" ]; then
              echo "Translations file does not exist: $translations_file_path. Skipping."
              echo ""
              continue
            fi

            if [ ! -f "$source_strings_file_path" ]; then
              echo "Source strings file does not exist: $source_strings_file_path. Skipping."
              echo ""
              continue
            fi

            num_attempted=$((num_attempted+1))

            > /tmp/seed_translations_response.txt
            curl_exit_code=0
            status_code=$(curl -sS --connect-timeout 10 --max-time 180 \
              -w "%{http_code}" \
              -o /tmp/seed_translations_response.txt \
              -X POST "${{ vars.AI_TRANSLATIONS_SEED_TRANSLATIONS_URL }}" \
              -F "application_name=${{ matrix.application.appName }}" \
              -F "translation_language=$edxLang" \
              -F "source_language=en" \
              -F "translation_file=@$translations_file_path" \
              -F "source_file=@$source_strings_file_path" \
              -H "Authorization: JWT ${JWT_TOKEN}") || curl_exit_code=$?

            if [ "$curl_exit_code" -ne 0 ]; then
              echo "Curl request to seed translations failed for language $edxLang for application ${{ matrix.application.appName }} with exit code $curl_exit_code."
              cat /tmp/seed_translations_response.txt
              num_failures=$((num_failures+1))
              continue
            fi

            if [ "$status_code" -eq 200 ]; then
              echo "API call to seed translations succeeded for language $edxLang for application ${{ matrix.application.appName }} with status code $status_code."
            else
              echo "API call to seed translations failed for language $edxLang for application ${{ matrix.application.appName }} with status code $status_code."
              cat /tmp/seed_translations_response.txt
              num_failures=$((num_failures+1))
            fi

            echo ""
          done

          if [ "$num_attempted" -eq 0 ]; then
            echo "No translations were seeded for application ${{ matrix.application.appName }}. Check that the application directory and translation files exist at the expected path."
            exit 1
          fi

          if [ "$num_failures" -ne 0 ]; then
            echo "One or more languages for application ${{ matrix.application.appName }} failed to be seeded. Failing job."
            exit 1
          fi
